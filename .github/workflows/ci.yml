name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  corpus-test:
    name: Corpus Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-analyzer
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build and install leta
        run: |
          cargo build --release
          mkdir -p ~/.local/bin
          cp target/release/leta ~/.local/bin/
          cp target/release/leta-daemon ~/.local/bin/
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install cctr
        run: cargo install cctr

      - name: Install language servers (npm)
        run: npm install -g typescript-language-server typescript intelephense

      - name: Install basedpyright
        run: pip install basedpyright

      - name: Install gopls
        run: |
          go install golang.org/x/tools/gopls@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install ruby-lsp
        run: gem install ruby-lsp

      - name: Install clangd
        run: sudo apt-get install -y clangd

      - name: Install jdtls
        run: |
          JDTLS_URL="https://www.eclipse.org/downloads/download.php?file=/jdtls/milestones/1.40.0/jdt-language-server-1.40.0-202409261450.tar.gz&r=1"
          wget -q "$JDTLS_URL" -O jdtls.tar.gz
          mkdir -p ~/.local/share/jdtls
          tar -xzf jdtls.tar.gz -C ~/.local/share/jdtls
          rm jdtls.tar.gz
          cat > ~/.local/bin/jdtls << 'WRAPPER'
          #!/bin/bash
          JAR=$(ls ~/.local/share/jdtls/plugins/org.eclipse.equinox.launcher_*.jar | head -1)
          exec java \
            -Declipse.application=org.eclipse.jdt.ls.core.id1 \
            -Dosgi.bundles.defaultStartLevel=4 \
            -Declipse.product=org.eclipse.jdt.ls.core.product \
            -noverify -Xmx1G \
            --add-modules=ALL-SYSTEM \
            --add-opens java.base/java.util=ALL-UNNAMED \
            --add-opens java.base/java.lang=ALL-UNNAMED \
            -jar "$JAR" \
            -configuration ~/.local/share/jdtls/config_linux \
            "$@"
          WRAPPER
          chmod +x ~/.local/bin/jdtls

      - name: Install lua-language-server
        run: |
          LUA_LS_VERSION="3.13.5"
          wget -q "https://github.com/LuaLS/lua-language-server/releases/download/${LUA_LS_VERSION}/lua-language-server-${LUA_LS_VERSION}-linux-x64.tar.gz" -O lua-ls.tar.gz
          mkdir -p ~/.local/share/lua-language-server
          tar -xzf lua-ls.tar.gz -C ~/.local/share/lua-language-server
          ln -s ~/.local/share/lua-language-server/bin/lua-language-server ~/.local/bin/
          rm lua-ls.tar.gz

      - name: Install OCaml and ocamllsp
        run: |
          sudo apt-get install -y opam
          opam init --auto-setup --disable-sandboxing --yes
          eval $(opam env)
          opam install ocaml-lsp-server --yes
          echo "$HOME/.opam/default/bin" >> $GITHUB_PATH

      - name: Install Zig and zls
        run: |
          wget -q "https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz"
          tar -xf zig-linux-x86_64-0.13.0.tar.xz
          ln -s "$PWD/zig-linux-x86_64-0.13.0/zig" ~/.local/bin/zig
          rm zig-linux-x86_64-0.13.0.tar.xz
          wget -q "https://github.com/zigtools/zls/releases/download/0.13.0/zls-x86_64-linux.tar.xz" -O zls.tar.xz
          tar -xf zls.tar.xz
          mv zls ~/.local/bin/
          rm zls.tar.xz

      - name: Build OCaml fixture
        run: |
          eval $(opam env)
          cd test/corpus/languages/ocaml/fixture
          opam exec -- dune build 2>/dev/null || true

      - name: Verify language servers
        run: |
          echo "Checking language servers..."
          for cmd in basedpyright-langserver typescript-language-server gopls rust-analyzer ruby-lsp clangd jdtls lua-language-server ocamllsp intelephense zls zig; do
            if which $cmd > /dev/null 2>&1; then
              echo "  ✓ $cmd"
            else
              echo "  ✗ $cmd MISSING" && exit 1
            fi
          done

      - name: Run corpus tests
        run: |
          eval $(opam env)
          leta daemon start
          sleep 2
          ./script/corpus-test

  check-release:
    name: Check Release
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, corpus-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check if release needed
        id: check
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Tag v$VERSION does not exist, will release"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ needs.check-release.outputs.version }}" -m "Release v${{ needs.check-release.outputs.version }}"
          git push origin "v${{ needs.check-release.outputs.version }}"
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.check-release.outputs.version }}" \
            --title "v${{ needs.check-release.outputs.version }}" \
            --notes "Release v${{ needs.check-release.outputs.version }}" \
            --draft

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: [check-release, create-release]
    if: needs.check-release.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.check-release.outputs.version }}
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: leta,leta-daemon
          target: ${{ matrix.target }}
          archive: leta-v${{ needs.check-release.outputs.version }}-${{ matrix.target }}
          ref: refs/tags/v${{ needs.check-release.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [check-release, create-release]
    if: needs.check-release.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish --workspace --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: Finalize Release
    runs-on: ubuntu-latest
    needs: [check-release, build, publish]
    if: needs.check-release.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Create Release Notes
        run: |
          cat > release_notes.md << 'EOF'
          ## Installation

          ```bash
          # Via Homebrew (macOS/Linux)
          brew install andreasjansson/tap/leta

          # Via Cargo
          cargo install leta
          ```

          ## Binaries

          Pre-built binaries are available for Linux and macOS (x86_64 and ARM64).
          EOF
      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "v${{ needs.check-release.outputs.version }}" \
            --notes-file release_notes.md \
            --latest \
            --draft=false

  homebrew:
    name: Update Homebrew
    needs: [check-release, release]
    if: needs.check-release.outputs.should_release == 'true'
    uses: ./.github/workflows/update-homebrew.yml
    with:
      version: ${{ needs.check-release.outputs.version }}
    secrets: inherit

  post-release-test-macos:
    name: Post-release Test (macOS/Homebrew)
    runs-on: macos-latest
    needs: [check-release, homebrew]
    if: needs.check-release.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install leta via Homebrew
        run: |
          brew tap andreasjansson/tap
          brew install leta
      - name: Install rust-analyzer
        run: |
          rustup component add rust-analyzer
      - name: Verify installation
        run: |
          leta --version
          which leta
          which leta-daemon
      - name: Add workspace and run leta
        run: |
          leta workspace add .
          leta grep "run" --head 10
          leta files --head 10

  post-release-test-linux:
    name: Post-release Test (Linux/GitHub Release)
    runs-on: ubuntu-latest
    needs: [check-release, release]
    if: needs.check-release.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install leta from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          ARCHIVE="leta-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          gh release download "v${VERSION}" --pattern "${ARCHIVE}"
          tar -xzf "${ARCHIVE}"
          sudo mv leta leta-daemon /usr/local/bin/
          rm "${ARCHIVE}"
      - name: Install rust-analyzer
        run: |
          rustup component add rust-analyzer
      - name: Verify installation
        run: |
          leta --version
          which leta
          which leta-daemon
      - name: Add workspace and run leta
        run: |
          leta workspace add .
          leta grep "run" --head 10
          leta files --head 10

