name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  corpus-test:
    name: "Corpus: ${{ matrix.name }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux jobs (these produce identical output on Ubuntu) ---
          - name: python
            os: ubuntu-latest
            paths: languages/python languages/multi_language leta leta/cache_invalidation languages/dummy_missing_server
            setup_python: true
            setup_go: true
            servers: basedpyright gopls
          - name: go
            os: ubuntu-latest
            paths: languages/go
            setup_go: true
            servers: gopls
          - name: jsx
            os: ubuntu-latest
            paths: languages/jsx
            setup_node: true
            servers: typescript-ls
          - name: lua
            os: ubuntu-latest
            paths: languages/lua
            servers: lua-ls-linux
          - name: php
            os: ubuntu-latest
            paths: languages/php
            setup_node: true
            servers: intelephense
          - name: ruby
            os: ubuntu-latest
            paths: languages/ruby
            setup_ruby: true
            servers: ruby-lsp
          # --- macOS jobs (platform-sensitive LSP output) ---
          - name: typescript
            os: macos-latest
            paths: languages/typescript
            setup_node: true
            servers: typescript-ls
          - name: rust
            os: macos-latest
            paths: languages/rust
            servers: none
          - name: java
            os: macos-latest
            paths: languages/java
            setup_java: true
            servers: jdtls
          - name: cpp
            os: macos-latest
            paths: languages/cpp
            servers: clangd
          - name: ocaml
            os: macos-latest
            paths: languages/ocaml
            servers: ocamllsp
          - name: zig
            os: macos-latest
            paths: languages/zig
            servers: zig-zls
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.91.1
        with:
          components: rust-analyzer
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cctr

      - uses: actions/setup-node@v4
        if: matrix.setup_node
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        if: matrix.setup_python
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v5
        if: matrix.setup_go
        with:
          go-version: "1.24"
      - uses: ruby/setup-ruby@v1
        if: matrix.setup_ruby
        with:
          ruby-version: "3.3"
      - uses: actions/setup-java@v4
        if: matrix.setup_java
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build and install leta
        run: |
          cargo build --release
          mkdir -p ~/.local/bin
          cp target/release/leta ~/.local/bin/
          cp target/release/leta-daemon ~/.local/bin/
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install basedpyright
        if: contains(matrix.servers, 'basedpyright')
        run: pip install basedpyright

      - name: Install gopls
        if: contains(matrix.servers, 'gopls')
        run: |
          go install golang.org/x/tools/gopls@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install TypeScript language servers
        if: contains(matrix.servers, 'typescript-ls')
        run: npm install -g typescript-language-server@4.3.3 typescript@5.8.3

      - name: Install intelephense
        if: contains(matrix.servers, 'intelephense')
        run: npm install -g intelephense@1.16.3

      - name: Install ruby-lsp
        if: contains(matrix.servers, 'ruby-lsp')
        run: gem install ruby-lsp

      - name: Install clangd (macOS)
        if: contains(matrix.servers, 'clangd')
        run: |
          brew install llvm
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH

      - name: Install jdtls (macOS)
        if: contains(matrix.servers, 'jdtls')
        run: |
          brew install jdtls openjdk
          echo "JAVA_HOME=$(brew --prefix openjdk)/libexec/openjdk.jdk/Contents/Home" >> $GITHUB_ENV

      - name: Install lua-language-server (macOS)
        if: matrix.servers == 'lua-ls'
        run: brew install lua-language-server

      - name: Install lua-language-server (Linux)
        if: matrix.servers == 'lua-ls-linux'
        run: |
          LUA_LS_VERSION="3.13.5"
          wget -q "https://github.com/LuaLS/lua-language-server/releases/download/${LUA_LS_VERSION}/lua-language-server-${LUA_LS_VERSION}-linux-x64.tar.gz" -O lua-ls.tar.gz
          mkdir -p ~/.local/share/lua-language-server
          tar -xzf lua-ls.tar.gz -C ~/.local/share/lua-language-server
          ln -s ~/.local/share/lua-language-server/bin/lua-language-server ~/.local/bin/
          rm lua-ls.tar.gz

      - name: Cache opam switch
        if: contains(matrix.servers, 'ocamllsp')
        id: opam-cache
        uses: actions/cache@v4
        with:
          path: ~/.opam
          key: opam-ocamllsp-${{ runner.os }}-${{ runner.arch }}

      - name: Set up OCaml and ocamllsp
        if: contains(matrix.servers, 'ocamllsp')
        run: |
          brew install opam
          if [ "${{ steps.opam-cache.outputs.cache-hit }}" != "true" ]; then
            opam init --auto-setup --disable-sandboxing --yes
            eval $(opam env)
            opam install ocaml-lsp-server dune --yes
          fi
          eval $(opam env)
          echo "$HOME/.opam/default/bin" >> $GITHUB_PATH
          cd test/corpus/languages/ocaml/fixture
          opam exec -- dune build 2>/dev/null || true

      - name: Install Zig and zls (macOS)
        if: contains(matrix.servers, 'zig-zls')
        run: brew install zig zls

      - name: Run corpus tests
        run: |
          if [[ "${{ matrix.servers }}" == *"ocamllsp"* ]]; then
            eval $(opam env)
          fi
          leta daemon start
          sleep 3
          for p in ${{ matrix.paths }}; do
            cctr "test/corpus/$p"
          done

  check-release:
    name: Check Release
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, corpus-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check if release needed
        id: check
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Tag v$VERSION does not exist, will release"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ needs.check-release.outputs.version }}" -m "Release v${{ needs.check-release.outputs.version }}"
          git push origin "v${{ needs.check-release.outputs.version }}"
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.check-release.outputs.version }}" \
            --title "v${{ needs.check-release.outputs.version }}" \
            --notes "Release v${{ needs.check-release.outputs.version }}" \
            --draft

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: [check-release, create-release]
    if: needs.check-release.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.check-release.outputs.version }}
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: leta,leta-daemon
          target: ${{ matrix.target }}
          archive: leta-v${{ needs.check-release.outputs.version }}-${{ matrix.target }}
          ref: refs/tags/v${{ needs.check-release.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [check-release, create-release]
    if: needs.check-release.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish --workspace --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: Finalize Release
    runs-on: ubuntu-latest
    needs: [check-release, build, publish]
    if: needs.check-release.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Create Release Notes
        run: |
          cat > release_notes.md << 'EOF'
          ## Installation

          ```bash
          # Via Homebrew (macOS/Linux)
          brew install andreasjansson/tap/leta

          # Via Cargo
          cargo install leta
          ```

          ## Binaries

          Pre-built binaries are available for Linux and macOS (x86_64 and ARM64).
          EOF
      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "v${{ needs.check-release.outputs.version }}" \
            --notes-file release_notes.md \
            --latest \
            --draft=false

  homebrew:
    name: Update Homebrew
    needs: [check-release, release]
    if: needs.check-release.outputs.should_release == 'true'
    uses: ./.github/workflows/update-homebrew.yml
    with:
      version: ${{ needs.check-release.outputs.version }}
    secrets: inherit

  post-release-test-macos:
    name: Post-release Test (macOS/Homebrew)
    runs-on: macos-latest
    needs: [check-release, homebrew]
    if: needs.check-release.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install leta via Homebrew
        run: |
          brew tap andreasjansson/tap
          brew install leta
      - name: Install rust-analyzer
        run: |
          rustup component add rust-analyzer
      - name: Verify installation
        run: |
          leta --version
          which leta
          which leta-daemon
      - name: Add workspace and run leta
        run: |
          leta workspace add .
          leta grep "run" --head 10
          leta files --head 10

  post-release-test-linux:
    name: Post-release Test (Linux/GitHub Release)
    runs-on: ubuntu-latest
    needs: [check-release, release]
    if: needs.check-release.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install leta from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          ARCHIVE="leta-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          gh release download "v${VERSION}" --pattern "${ARCHIVE}"
          tar -xzf "${ARCHIVE}"
          sudo mv leta leta-daemon /usr/local/bin/
          rm "${ARCHIVE}"
      - name: Install rust-analyzer
        run: |
          rustup component add rust-analyzer
      - name: Verify installation
        run: |
          leta --version
          which leta
          which leta-daemon
      - name: Add workspace and run leta
        run: |
          leta workspace add .
          leta grep "run" --head 10
          leta files --head 10

